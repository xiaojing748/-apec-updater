name: Daily APEC Update

on:
  schedule:
    # 每天北京时间 08:00 (UTC 00:00)
    - cron: "0 0 * * *"
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r scraper/requirements.txt
          pip install cos-python-sdk-v5

      - name: Run scraper
        run: python scraper/main.py

      - name: Inject data into COS
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_REGION: ap-beijing
          COS_BUCKET: apec-tracker-hajimi-2026-1449615649
        run: python inject_data.py

      - name: Commit daily data (for record)
        run: |
          git config user.name "APEC Bot"
          git config user.email "bot@apec-tracker.local"
          git add data/ || true
          git diff --staged --quiet || git commit -m "Daily update: $(TZ='Asia/Shanghai' date +'%Y-%m-%d')"
          git push || true
